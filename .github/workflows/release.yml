name: Release

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Exact release tag, e.g. v1.2.0 (leave empty to auto-bump the patch)"
        required: false
        default: ""

permissions:
  contents: write
  packages: write

jobs:
  create-tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.create_tag.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_latest_tag
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$latest_tag" >> $GITHUB_OUTPUT

      - name: Create new tag
        id: create_tag
        env:
          MANUAL_VERSION: ${{ github.event.inputs.version }}
          LATEST_TAG: ${{ steps.get_latest_tag.outputs.latest_tag }}
        run: |
          if [ -n "$MANUAL_VERSION" ]; then
            if ! echo "$MANUAL_VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Invalid version '$MANUAL_VERSION' (expected vMAJOR.MINOR.PATCH)" >&2
              exit 1
            fi
            new_tag="$MANUAL_VERSION"
          else
            major=$(echo "$LATEST_TAG" | cut -d. -f1 | tr -d 'v')
            minor=$(echo "$LATEST_TAG" | cut -d. -f2)
            patch=$(echo "$LATEST_TAG" | cut -d. -f3)
            new_patch=$((patch + 1))
            new_tag="v$major.$minor.$new_patch"
          fi
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag ${{ steps.create_tag.outputs.new_tag }}
          git push origin ${{ steps.create_tag.outputs.new_tag }}

  goreleaser:
    needs: create-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
